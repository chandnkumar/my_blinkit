<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grocery Order Summary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .item-name {
      font-weight: bold;
    }
    .price {
      color: green;
    }
    .old-price {
      text-decoration: line-through;
      color: #999;
      margin-left: 5px;
    }
    .charges, .total {
      margin-top: 20px;
    }
    .charges div, .total div {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }
    .policy {
      font-size: 0.9em;
      color: #555;
      margin-top: 20px;
    }
    .login-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      text-align: center;
      border: none;
      border-radius: 5px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Order Summary</h2>
    <div class="item">
      <span class="item-name">Potato - New Crop (1kg)</span>
      <span>
        <span class="price">₹18</span>
        <span class="old-price">₹30</span>
      </span>
    </div>

    <div class="charges">
      <div><span>Items Total</span><span>₹30 ₹18 (Saved ₹12)</span></div>
      <div><span>Delivery Charge</span><span>₹25</span></div>
      <div><span>Handling Charge</span><span>₹2</span></div>
      <div><span>Small Cart Charge</span><span>₹20</span></div>
    </div>

    <div class="total">
      <div><strong>Grand Total</strong><strong>₹65</strong></div>
    </div>

    <div class="policy">
      <p>Orders cannot be cancelled once packed for delivery. In case of unexpected delays, a refund will be provided, if applicable.</p>
    </div>

    <button class="login-btn">Login to Proceed</button>
  </div>
</body>
</html>
